<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contact-box">
        <h2>Đăng ký tư vấn</h2>
        <form action="#">
            <div class="input-group">
                <label>Họ và Tên</label>
                <input type="text" placeholder="Đỗ Bá Kiệt" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="kietdo04052005@gmail.com" required>
            </div>

            <div class="input-group">
                <label>Số điện thoại</label>
                <input type="tel" placeholder="0941648209" required>
            </div>

            <button type="submit">Gửi ngay</button>
        </form>
    </div>

</body>
</html>
</html>
